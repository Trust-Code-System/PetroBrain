# PetroBrain Render Blueprint - DEMO ONLY. NOT FOR CUSTOMER DATA.
#
# This blueprint exists for sales demos and pre-release evaluation. State is
# ephemeral, the LLM key is shared, and the validator is intentionally skipped
# (PB_ENVIRONMENT=demo, not "prod"). DO NOT point real customers at this URL.
#
# What's wired up:
#   - Render Free plan (cold-starts after 15 min idle).
#   - Object storage is IN-MEMORY (PB_OBJECT_STORE_BACKEND=memory).
#     /admin/documents now returns 410 here so uploads can't silently vanish.
#   - Audit log lives at /tmp/audit.jsonl, lost on every deploy.
#   - Reranker disabled to keep RAM under the 512 MB free-tier ceiling.
#   - Self-signup OFF; an admin must invite users via /admin/.../users.
#   - /health reports {"demo": true, "warning": "..."} so clients show a banner.
#
# To promote to production:
#   1. Add a `databases:` block (Postgres Basic-256MB, $6/mo).
#   2. Change `plan: free` -> `plan: starter` ($7/mo, no cold starts).
#   3. Set PB_PERSISTENCE_BACKEND back to `postgres` and add the
#      PB_DATABASE_URL fromDatabase reference.
#   4. Re-enable PB_RERANK_ENABLED if you want better RAG quality.

services:
  - type: web
    name: petrobrain-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    # Start command lives in the Dockerfile CMD - Render's launcher mangles
    # &&-chained dockerCommand strings (both bare and JSON-array form fail
    # with status 127, "not found"). Dockerfile CMD is built once at image
    # build time and exec'd untouched, so the migration + uvicorn chain
    # runs cleanly.
    envVars:
      - key: PORT
        value: "8000"

      # --- Persistence: managed Postgres (Neon) for data that survives
      #     redeploys. PB_DATABASE_URL is pasted in the Render dashboard. ---
      - key: PB_PERSISTENCE_BACKEND
        value: postgres
      - key: PB_DATABASE_URL
        sync: false

      # --- Audit log path: Render free-tier filesystem is read-only outside
      #     /tmp, so the default "logs/audit.jsonl" path fails with permission
      #     denied AFTER the user record is already committed (causing 500
      #     responses but real Postgres rows). /tmp is always writable. ---
      - key: PB_AUDIT_LOG_PATH
        value: /tmp/audit.jsonl

      # --- App identity (demo/free-tier only; AWS Terraform is the production path). ---
      - key: PB_ENVIRONMENT
        value: demo
      - key: PB_OPERATIONAL_TIER
        value: "false"
      - key: PB_SOVEREIGN_REGION
        value: eu-central-1

      # --- LLM (Tier A, hosted Anthropic) ---
      - key: PB_LLM_PROVIDER
        value: anthropic
      - key: PB_LLM_MODEL
        value: claude-sonnet-4-6
      - key: PB_LLM_MAX_TOKENS
        value: "2048"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

      # --- Reranker disabled on free tier (512 MB RAM ceiling).
      #     Re-enable when on Starter plan. ---
      - key: PB_RERANK_ENABLED
        value: "false"

      # --- Object storage: in-memory; uploads do not persist. ---
      - key: PB_OBJECT_STORE_BACKEND
        value: memory

      # --- Celery: inline; no Redis dependency. ---
      - key: PB_CELERY_TASK_ALWAYS_EAGER
        value: "true"
      - key: PB_TOKEN_COST_REDIS_ENABLED
        value: "false"

      # --- Observability ---
      - key: PB_LOG_JSON
        value: "true"
      - key: PB_METRICS_ENABLED
        value: "false"
      - key: PB_METRICS_AUTH_TOKEN
        sync: false

      # --- Auth: Render generates a strong secret on first deploy. ---
      - key: PB_JWT_SECRET
        generateValue: true
      - key: PB_JWT_ISSUER
        value: petrobrain
      - key: PB_JWT_AUDIENCE
        value: petrobrain-api
      - key: PB_ENABLE_SELF_SIGNUP
        value: "false"

      # --- Neon Auth (SSO): verify the EdDSA JWT the web app forwards as a
      #     Bearer against Neon's JWKS, then map the token's `sub` to an active
      #     users row (see app/api/deps.py::_neon_principal).
      #     NEON_AUTH_BASE_URL has NO PB_ prefix - it matches the value the web
      #     app/Vercel already use, and MUST include the `/neondb/auth` path
      #     segment: Neon routes by the first path segment as the database name,
      #     so dropping it makes JWKS resolve against a nonexistent db "api". ---
      - key: PB_NEON_AUTH_ENABLED
        value: "true"
      - key: NEON_AUTH_BASE_URL
        value: https://ep-empty-fire-apd8y5nz.neonauth.c-7.us-east-1.aws.neon.tech/neondb/auth

      # --- Optional web search via Tavily. Leave blank to disable. ---
      - key: PB_TAVILY_API_KEY
        sync: false

      # --- CORS: paste the deployed frontend/admin HTTPS origin(s).
      #     Do not use '*', localhost, or 127.0.0.1 outside local dev. ---
      - key: PB_CORS_ALLOW_ORIGINS
        sync: false

      # --- Founder bootstrap: emails that get platform_admin on signup. ---
      - key: PB_BOOTSTRAP_PLATFORM_ADMIN_EMAILS
        sync: false
