# PetroBrain Render Blueprint (Free Tier).
#
# Zero-cost first-deploy config:
#   - Web service on Render's Free plan (cold-starts after 15 min idle).
#   - No managed Postgres; persistence_backend=local_json stores everything
#     inside the container, so data resets on every deploy/restart.
#   - Reranker disabled to keep RAM under the 512 MB free-tier ceiling.
#
# To promote to production:
#   1. Add a `databases:` block (Postgres Basic-256MB, $6/mo).
#   2. Change `plan: free` -> `plan: starter` ($7/mo, no cold starts).
#   3. Set PB_PERSISTENCE_BACKEND back to `postgres` and add the
#      PB_DATABASE_URL fromDatabase reference.
#   4. Re-enable PB_RERANK_ENABLED if you want better RAG quality.

services:
  - type: web
    name: petrobrain-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PORT
        value: "8000"

      # --- Persistence: fileless mode (data resets on restart). ---
      - key: PB_PERSISTENCE_BACKEND
        value: local_json

      # --- App identity ---
      - key: PB_ENVIRONMENT
        value: prod
      - key: PB_OPERATIONAL_TIER
        value: "false"
      - key: PB_SOVEREIGN_REGION
        value: eu-central-1

      # --- LLM (Tier A, hosted Anthropic) ---
      - key: PB_LLM_PROVIDER
        value: anthropic
      - key: PB_LLM_MODEL
        value: claude-sonnet-4-6
      - key: PB_LLM_MAX_TOKENS
        value: "2048"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

      # --- Reranker disabled on free tier (512 MB RAM ceiling).
      #     Re-enable when on Starter plan. ---
      - key: PB_RERANK_ENABLED
        value: "false"

      # --- Object storage: in-memory; uploads do not persist. ---
      - key: PB_OBJECT_STORE_BACKEND
        value: memory

      # --- Celery: inline; no Redis dependency. ---
      - key: PB_CELERY_TASK_ALWAYS_EAGER
        value: "true"
      - key: PB_TOKEN_COST_REDIS_ENABLED
        value: "false"

      # --- Observability ---
      - key: PB_LOG_JSON
        value: "true"
      - key: PB_METRICS_ENABLED
        value: "true"

      # --- Auth: Render generates a strong secret on first deploy. ---
      - key: PB_JWT_SECRET
        generateValue: true
      - key: PB_JWT_ISSUER
        value: petrobrain
      - key: PB_JWT_AUDIENCE
        value: petrobrain-api

      # --- Optional web search via Tavily. Leave blank to disable. ---
      - key: PB_TAVILY_API_KEY
        sync: false

      # --- CORS: paste the Vercel domain after the first frontend deploy.
      #     For first deploy, set to '*' so any origin can call the API. ---
      - key: PB_CORS_ALLOW_ORIGINS
        sync: false
